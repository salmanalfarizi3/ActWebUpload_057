<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Unggah File</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0,0,0,.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .header h2 { font-size: 1.4rem; font-weight: 700; color: #222; }

        .link-riwayat {
            font-size: .82rem;
            color: #4a5266;
            text-decoration: none;
            font-weight: 600;
        }
        .link-riwayat:hover { text-decoration: underline; }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #c9d3e8;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .25s, background .25s;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #373f4a;
            background: #f0f4ff;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .drop-icon {
            width: 52px; height: 52px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto .75rem;
            font-size: 1.5rem;
        }
        .drop-label { font-size: .9rem; color: #888282; }
        .drop-label span { color: #636e8a; font-weight: 600; }
        .drop-types { font-size: .75rem; color: #bbb; margin-top: .4rem; }

        /* Preview */
        #preview-container {
            display: none;
            margin-top: 1.25rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e4ee;
        }

        #preview {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            display: block;
        }

        .preview-info {
            padding: .75rem 1rem;
            background: #f8f9fb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .preview-info .meta { flex: 1; }
        .preview-info .meta .nama {
            font-size: .85rem;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }
        .preview-info .meta .ukuran { font-size: .78rem; color: #888; margin-top: .15rem; }

        .btn-hapus {
            background: #fde8e8;
            color: #d93025;
            border: none;
            padding: .4rem .85rem;
            border-radius: 7px;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
        }
        .btn-hapus:hover { background: #f5c6c6; }

        /* Tombol submit */
        .btn-submit {
            width: 100%;
            margin-top: 1.25rem;
            padding: .85rem;
            background: #585e6c;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }
        .btn-submit:hover:not(:disabled) { background: #3a66d8; transform: translateY(-1px); }
        .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-overlay.aktif { display: flex; }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid #e0e4ee;
            border-top-color: #4f7df3;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { font-size: .9rem; color: #555; font-weight: 600; }

        /* Progress bar */
        .progress-wrap {
            display: none;
            margin-top: .75rem;
        }
        .progress-wrap.aktif { display: block; }
        .progress-bar-bg {
            background: #e8edf5;
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f7df3, #7aa3f8);
            border-radius: 99px;
            width: 0%;
            transition: width .1s;
        }
        .progress-text {
            text-align: right;
            font-size: .75rem;
            color: #888;
            margin-top: .3rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>Unggah File</h2>
        <a href="lihatini.php" class="link-riwayat">📂 Lihat Riwayat</a>
    </div>

    <form action="upload.php" method="post" enctype="multipart/form-data" id="uploadForm">

        <div class="drop-zone" id="dropZone">
            <input type="file" name="fileToUpload" id="fileToUpload" accept="image/*"/>
            <div class="drop-icon">📁</div>
            <p class="drop-label"><span>Klik untuk pilih</span> atau seret ke sini</p>
            <p class="drop-types">JPG, PNG, GIF, WEBP — maks. 500MB</p>
        </div>

        <!-- Preview gambar -->
        <div id="preview-container">
            <img id="preview" src="#" alt="Pratinjau"/>
            <div class="preview-info">
                <div class="meta">
                    <div class="nama" id="namaFile">—</div>
                    <div class="ukuran" id="ukuranFile">—</div>
                </div>
                <button type="button" class="btn-hapus" id="btnHapus">✕ Hapus</button>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit" disabled>Unggah File</button>
    </form>
</div>

<!-- Loading saat submit -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Sedang mengunggah...</p>
</div>

<script>
    const input      = document.getElementById('fileToUpload');
    const dropZone   = document.getElementById('dropZone');
    const container  = document.getElementById('preview-container');
    const preview    = document.getElementById('preview');
    const namaFile   = document.getElementById('namaFile');
    const ukuranFile = document.getElementById('ukuranFile');
    const btnHapus   = document.getElementById('btnHapus');
    const btnSubmit  = document.getElementById('btnSubmit');
    const form       = document.getElementById('uploadForm');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    function formatSize(bytes) {
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
        if (bytes >= 1024)    return (bytes / 1024).toFixed(2) + ' KB';
        return bytes + ' B';
    }

    function tampilkanPreview(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            preview.src    = e.target.result;
            namaFile.textContent  = file.name;
            ukuranFile.textContent = formatSize(file.size);
            container.style.display = 'block';
            btnSubmit.disabled = false;
        };
        reader.readAsDataURL(file);
    }

    function hapusFile() {
        input.value = '';
        preview.src = '#';
        namaFile.textContent  = '—';
        ukuranFile.textContent = '—';
        container.style.display = 'none';
        btnSubmit.disabled = true;
        progressWrap.classList.remove('aktif');
    }

    input.addEventListener('change', () => tampilkanPreview(input.files[0]));
    btnHapus.addEventListener('click', hapusFile);

    // Drag & drop
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) {
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            tampilkanPreview(file);
        }
    });

    // Upload dengan progress
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!input.files[0]) return;

        const formData = new FormData(form);
        const xhr = new XMLHttpRequest();

        progressWrap.classList.add('aktif');
        btnSubmit.disabled = true;

        xhr.upload.addEventListener('progress', ev => {
            if (ev.lengthComputable) {
                const pct = Math.round((ev.loaded / ev.total) * 100);
                progressFill.style.width = pct + '%';
                progressText.textContent = pct + '%';
            }
        });

        xhr.addEventListener('load', () => {
            // Redirect ke lihatini.php setelah selesai
            window.location.href = 'lihatini.php?pesan=upload_ok';
        });

        xhr.addEventListener('error', () => {
            alert('Gagal mengunggah. Coba lagi.');
            btnSubmit.disabled = false;
        });

        xhr.open('POST', form.action);
        xhr.send(formData);
    });
</script>

</body>
</html>
